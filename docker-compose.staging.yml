# Staging override stack — runs backend/frontend against a staging database
# in the existing Multica Postgres cluster.
#
# Requires the main self-host stack network (`multica_default`) to exist so
# STAGING_DATABASE_URL can use host `postgres` by default.

name: multica-staging

services:
  backend-staging:
    image: ${STAGING_MULTICA_BACKEND_IMAGE:-ghcr.io/multica-ai/multica-backend}:${STAGING_MULTICA_IMAGE_TAG:-latest}
    ports:
      - "${STAGING_PORT:-8081}:8080"
    volumes:
      - staging_backend_uploads:/app/data/uploads
    environment:
      DATABASE_URL: ${STAGING_DATABASE_URL:-postgres://multica:multica@postgres:5432/multica_staging?sslmode=disable}
      PORT: "8080"
      METRICS_ADDR: ${STAGING_METRICS_ADDR:-}
      JWT_SECRET: ${STAGING_JWT_SECRET:-change-me-for-staging}
      FRONTEND_ORIGIN: ${STAGING_FRONTEND_ORIGIN:-http://localhost:3001}
      CORS_ALLOWED_ORIGINS: ${STAGING_CORS_ALLOWED_ORIGINS:-}
      RESEND_API_KEY: ${STAGING_RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${STAGING_RESEND_FROM_EMAIL:-noreply@multica.ai}
      GOOGLE_CLIENT_ID: ${STAGING_GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${STAGING_GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${STAGING_GOOGLE_REDIRECT_URI:-http://localhost:3001/auth/callback}
      S3_BUCKET: ${STAGING_S3_BUCKET:-}
      S3_REGION: ${STAGING_S3_REGION:-us-west-2}
      CLOUDFRONT_DOMAIN: ${STAGING_CLOUDFRONT_DOMAIN:-}
      CLOUDFRONT_KEY_PAIR_ID: ${STAGING_CLOUDFRONT_KEY_PAIR_ID:-}
      CLOUDFRONT_PRIVATE_KEY: ${STAGING_CLOUDFRONT_PRIVATE_KEY:-}
      COOKIE_DOMAIN: ${STAGING_COOKIE_DOMAIN:-}
      APP_ENV: ${STAGING_APP_ENV:-staging}
      MULTICA_DEV_VERIFICATION_CODE: ${STAGING_MULTICA_DEV_VERIFICATION_CODE:-}
      MULTICA_APP_URL: ${STAGING_MULTICA_APP_URL:-http://localhost:3001}
      ALLOW_SIGNUP: ${STAGING_ALLOW_SIGNUP:-true}
      ALLOWED_EMAILS: ${STAGING_ALLOWED_EMAILS:-}
      ALLOWED_EMAIL_DOMAINS: ${STAGING_ALLOWED_EMAIL_DOMAINS:-}
    restart: unless-stopped

  frontend-staging:
    image: ${STAGING_MULTICA_WEB_IMAGE:-ghcr.io/multica-ai/multica-web}:${STAGING_MULTICA_IMAGE_TAG:-latest}
    depends_on:
      - backend-staging
    ports:
      - "${STAGING_FRONTEND_PORT:-3001}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped

volumes:
  staging_backend_uploads:

networks:
  default:
    external: true
    name: multica_default
